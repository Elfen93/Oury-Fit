    *,*::before,*::after {

      margin: 0;
      padding: 0;
    }
    html, body, #root {

      color: #f4f4f7;

    }
    ::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade {
      animation: fadeIn 0.4s ease both;
    }
    .press {
      transition: transform 0.1s ease;
    }
    .press:active {
      transform: scale(0.96);
    }
    input, select {
      background: #13131c;
      border: 1px solid #2a2a38;
      color: #f4f4f7;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus {
      border-color: #c4f542;
    }
    input::placeholder {
      color: #56566a;
    }
  </style>
</head>

    const FRASES = [
      "¿Amor? ¿Sueños? No son esas sandeces lo que necesita nuestra juventud. Lo que necesitamos es... Calcio.",
    ];

    const DIAS_CICLO = ["Día 1", "Día 2", "Día 3", "Día 4", "Día 5", "Día 6", "Día 7"];

    const defaultData = {
      profile: { name: "Oury", peso: 70, altura: 175, edad: 25, setup: true },
      semana: 1, racha: 0, mejorRacha: 0,
      registros: {}, comidas: {}, agua: {}, pesoCorporal: {}, records: {},
      metas: { calorias: 2800, proteina: 140, carbs: 350, grasa: 80, agua: 3.0, pesoObjetivo: 75 },
      ciclo: ["r1", "r2", "descanso", "r3", "r4", "descanso", "descanso"],
      diaCicloActivo: 0,
      rutinas: DEFAULT_RUTINA,
      customFoods: []
    };

    // ── STREAMING_CHUNK: Sheets API original integration ──
    async function sheetLoad(email) {
      const r = await fetch(`${SCRIPT_URL}?action=load&email=${encodeURIComponent(email)}`);
      const json = await r.json();
      if (json.status === "error") throw new Error(json.error);
      return json.data;
    }

    async function sheetSave(email, data) {
      await fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({ action: "save", email, data })
      });
    }

    function sheetToApp(raw) {
      const perfil = raw.perfil || {};
      return {
        ...defaultData,
        profile: perfil.profile || defaultData.profile,
        semana: perfil.semana ?? 1,
        racha: perfil.racha ?? 0,
        mejorRacha: perfil.mejorRacha ?? 0,
        metas: perfil.metas || defaultData.metas,
        ciclo: perfil.ciclo || defaultData.ciclo,
        diaCicloActivo: perfil.diaCicloActivo ?? 0,
        rutinas: perfil.rutinas || defaultData.rutinas,
        customFoods: perfil.customFoods || [],
        registros: raw.entrenos || {},
        comidas: raw.comidas || {},
        agua: raw.agua || {},
        pesoCorporal: raw.peso || {},
        records: raw.records || {},
      };
    }

    function appToSheet(data) {
      return {
        perfil: {
          profile: data.profile,
          semana: data.semana,
          racha: data.racha,
          mejorRacha: data.mejorRacha,
          metas: data.metas,
          ciclo: data.ciclo,
          diaCicloActivo: data.diaCicloActivo,
          rutinas: data.rutinas,
          customFoods: data.customFoods
        },
        entrenos: data.registros,
        comidas: data.comidas,
        agua: data.agua,
        peso: data.pesoCorporal,
        records: data.records,
      };
    }

    // ── STREAMING_CHUNK: Local session helpers ──
    function loadSession(hk) {
      try {
        const r = localStorage.getItem(SESSION_KEY);
        const s = r ? JSON.parse(r) : null;
        return s?.fecha === hk ? s : null;
      } catch { return null; }
    }

    function saveSession(s) {
      try { localStorage.setItem(SESSION_KEY, JSON.stringify(s)); } catch {}
    }

    const hoyKey = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
    };

    const sonarBeep = () => {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.2);
      } catch {}
    };

    // ── STREAMING_CHUNK: Main Store Hook ──
    function useStore() {
      const [data, setData] = useState(defaultData);
      const [loaded, setLoaded] = useState(false);
      const [email, setEmail] = useState(() => localStorage.getItem("ouryfit_email") || null);
      const [authError, setAuthError] = useState(null);
      const [syncing, setSyncing] = useState(false);
      const saveTimer = useRef(null);

      useEffect(() => {
        if (!email) {
          // Si no hay email, cargar desde localStorage local
          const local = localStorage.getItem(KEY);
          if (local) setData({ ...defaultData, ...JSON.parse(local) });
          setLoaded(true);
          return;
        }
        setLoaded(false);
        sheetLoad(email).then(raw => {
          setData(sheetToApp(raw));
          setLoaded(true);
        }).catch(err => {
          if (err.message === "acceso_denegado") {
            setAuthError("acceso_denegado");
            localStorage.removeItem("ouryfit_email");
            setEmail(null);
          } else {
            const raw = localStorage.getItem(KEY);
            if (raw) setData({ ...defaultData, ...JSON.parse(raw) });
            setLoaded(true);
          }
        });
      }, [email]);

      function handleGoogleLogin(response) {
        const payload = JSON.parse(atob(response.credential.split(".")[1]));
        const userEmail = payload.email;
        localStorage.setItem("ouryfit_email", userEmail);
        setAuthError(null);
        setEmail(userEmail);
      }

      function logout() {
        localStorage.removeItem("ouryfit_email");
        setEmail(null);
        setData(defaultData);
        setLoaded(false);
      }

      const save = useCallback((nd) => {
        setData(nd);
        try { localStorage.setItem(KEY, JSON.stringify(nd)); } catch {}
        if (saveTimer.current) clearTimeout(saveTimer.current);
        saveTimer.current = setTimeout(async () => {
          if (!email) return;
          setSyncing(true);
          try { await sheetSave(email, appToSheet(nd)); } catch {}
          setSyncing(false);
        }, 1500);
      }, [email]);

      const addCustomFood = (food) => {
        const updated = [food, ...(data.customFoods || [])];
        save({ ...data, customFoods: updated });
      };

      const removeCustomFood = (index) => {
        const updated = (data.customFoods || []).filter((_, i) => i !== index);
        save({ ...data, customFoods: updated });
      };

      return { data, save, loaded, email, handleGoogleLogin, logout, authError, syncing, customFoods: data.customFoods || [], addCustomFood, removeCustomFood };
    }

    // ── STREAMING_CHUNK: Component Definitions ──
    function Ring({ pct, size = 130, stroke = 10, color = D.lime }) {
      const r = (size - stroke) / 2, circ = 2 * Math.PI * r, off = circ - (Math.min(100, pct) / 100) * circ;
      return html`<svg width=${size} height=${size} style="transform:rotate(-90deg);filter:drop-shadow(0 0 8px ${color}33)">
        <circle cx=${size / 2} cy=${size / 2} r=${r} fill="none" stroke=${D.line} stroke-width=${stroke}/>
        <circle cx=${size / 2} cy=${size / 2} r=${r} fill="none" stroke=${color} stroke-width=${stroke}
          stroke-dasharray=${circ} stroke-dashoffset=${off} stroke-linecap="round"
          style="transition:stroke-dashoffset 0.8s cubic-bezier(0.16,1,0.3,1)"/>
      </svg>`;
    }

    function Bar({ pct, color, h = 6 }) {
      return html`<div style="height:${h}px;background:${D.line};border-radius:99px;overflow:hidden">
        <div style="height:100%;width:${Math.min(100, pct)}%;background:${color};border-radius:99px;transition:width 0.6s ease;box-shadow:0 0 6px ${color}44"/>
      </div>`;
    }

    function Spinner({ size = 28, color = D.lime }) {
      return html`<div style="width:${size}px;height:${size}px;border:3px solid ${D.line};border-top-color:${color};border-radius:50%;animation:spin 0.8s linear infinite"/>`;
    }

    // ── STREAMING_CHUNK: Login Screen Component ──
    function LoginScreen({ onLogin, error }) {
      const [ready, setReady] = useState(false);

      useEffect(() => {
        let tries = 0;
        function tryInit() {
          if (window.google?.accounts?.id) {
            window.google.accounts.id.initialize({ client_id: CLIENT_ID, callback: onLogin, ux_mode: "popup" });
            window.google.accounts.id.renderButton(document.getElementById("g_btn"), { theme: "filled_black", size: "large", width: 260, text: "continue_with" });
            setReady(true);
          } else if (++tries < 40) setTimeout(tryInit, 300);
        }
        tryInit();
      }, []);

      return html`<div class="fade" style="background:${D.bg};min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;color:${D.text}">
        <div style="width:72px;height:72px;border-radius:22px;background:linear-gradient(135deg,${D.lime},${D.limeDark});display:flex;align-items:center;justify-content:center;box-shadow:0 0 35px ${D.lime}44;margin-bottom:20px">
          <i class="ti ti-bolt" style="font-size:38px;color:${D.bg}"/>

        <div style="font-size:30px;font-weight:900;letter-spacing:-1px;margin-bottom:4px">OURYFIT <span class="text-[#c4f542] text-xs font-semibold">PRO</span></div>

        ${error === "acceso_denegado" && html`<div style="background:#2a0f0f;border:1px solid ${D.rose}44;border-radius:14px;padding:12px 18px;margin-bottom:20px;font-size:13px;color:${D.rose};text-align:center;max-width:300px">
          Este correo no tiene acceso autorizado a la hoja OuryFit.
        </div>`}

        <div style="background:${D.card};border:1px solid ${D.line};border-radius:20px;padding:28px;text-align:center;max-width:320px;width:100%">
          <div style="font-size:15px;font-weight:600;margin-bottom:6px">Inicia con Google Sheets</div>
          <div style="font-size:13px;color:${D.dim};margin-bottom:24px">Tus progresos se guardan en tu hoja de cálculo OuryFit automáticamente.</div>
          <div id="g_btn" style="display:flex;justify-content:center;min-height:44px;align-items:center">
            ${!ready && html`<${Spinner} size=${24}/>`}
          </div>
        </div>
      </div>`;
    }

    // ── STREAMING_CHUNK: Dashboard Component with 7-Day Cycle ──
    function Dashboard({ data, save, setView, customFoods }) {
      const hk = hoyKey();
      const entrHoy = data.registros[hk];
      const cm = data.comidas[hk] || { cal: 0, prot: 0, carbs: 0, grasa: 0 };
      const aguaHoy = data.agua[hk] || 0;
      const frase = FRASES[new Date().getDate() % FRASES.length];

      const calPct = Math.round((cm.cal / data.metas.calorias) * 100);
      const restante = Math.max(0, data.metas.calorias - Math.round(cm.cal));

      // Obtenemos la rutina asignada para el día activo del microciclo (0-6)
      const diaActivoIndice = data.diaCicloActivo ?? 0;
      const rutinaIdAsignada = data.ciclo[diaActivoIndice];
      const rutinaAsignadaObj = rutinaIdAsignada !== "descanso" ? data.rutinas.find(r => r.id === rutinaIdAsignada) : null;

      const cambiarAsignacionDia = (index, valor) => {
        const nuevoCiclo = [...data.ciclo];
        nuevoCiclo[index] = valor;
        save({ ...data, ciclo: nuevoCiclo });
      };

      const setDiaActivoManual = (index) => {
        save({ ...data, diaCicloActivo: index });
      };

      return html`<div class="p-4 space-y-6">
        <!-- Saludo e info superior -->
        <div class="fade flex justify-between items-start">
          <div>
            <div style="font-size:13px;color:${D.dim}">Hola, Oury</div>
            <div style="font-size:28px;font-weight:900;letter-spacing:-1px;color:${D.text}">OuryFit <span class="text-[#c4f542] text-sm"></span></div>
          </div>
          <div style="display:flex;align-items:center;gap:7px;background:${D.card};border:1px solid ${D.line};border-radius:14px;padding:9px 14px">
            <i class="ti ti-flame" style="font-size:20px;color:${D.amber}"/>
            <div>
              <div style="font-size:17px;font-weight:800;color:${D.text};line-height:1">${data.racha}</div>
              <div style="font-size:9px;color:${D.faint};letter-spacing:0.5px">RACHA</div>
            </div>
          </div>
        </div>
        <div style="font-size:13px;color:${D.dim};font-style:italic;margin:-8px 0 16px">"${frase}"</div>

        <!-- Bloque de entrenamiento de hoy (Basado en el Ciclo de 7 Días) -->
        ${rutinaAsignadaObj && !entrHoy && html`<div class="press fade" onClick=${() => setView("entreno")}
          style="position:relative;overflow:hidden;background:linear-gradient(145deg,${D.card},${D.surface});border:1px solid ${rutinaAsignadaObj.acento}33;border-radius:24px;padding:22px;cursor:pointer;box-shadow:0 0 30px ${rutinaAsignadaObj.acento}15">
          <div style="position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:${rutinaAsignadaObj.acento};opacity:0.08;filter:blur(30px)"/>
          <div style="font-size:11px;color:${rutinaAsignadaObj.acento};text-transform:uppercase;letter-spacing:2px;font-weight:700">Toca para entrenar - Día ${diaActivoIndice + 1} del ciclo</div>
          <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:14px">
            <div>
              <div style="font-size:22px;font-weight:800;color:${D.text};letter-spacing:-0.5px">${rutinaAsignadaObj.nombre}</div>
              <div style="font-size:13px;color:${D.dim};margin-top:4px">${rutinaAsignadaObj.ejercicios.length} ejercicios planificados</div>
            </div>
            <div style="width:52px;height:52px;border-radius:16px;background:${rutinaAsignadaObj.acento};display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px ${rutinaAsignadaObj.acento}55;flex-shrink:0">
              <i class="ti ti-player-play-filled" style="font-size:24px;color:${D.bg}"/>
            </div>

    // ── STREAMING_CHUNK: Routine editor and planner ──
    function Rutinas({ data, save }) {
      const [editMode, setEditMode] = useState(null); // id de la rutina en edicion

      const handleModificarEjercicio = (rutinaId, ejIdx, campo, valor) => {
        const actualizadas = data.rutinas.map(r => {
          if (r.id === rutinaId) {
            const nuevosEjs = r.ejercicios.map((ej, idx) => {
              if (idx === ejIdx) {
                return { ...ej, [campo]: valor };
              }
              return ej;
            });
            return { ...r, ejercicios: nuevosEjs };
          }
          return r;
        });
        save({ ...data, rutinas: actualizadas });
      };

      const handleAgregarEjercicio = (rutinaId) => {
        const actualizadas = data.rutinas.map(r => {
          if (r.id === rutinaId) {
            return {
              ...r,
              ejercicios: [
                ...r.ejercicios,
                { nombre: "Nuevo Ejercicio", series: 3, reps: "10", descanso: 60, notas: "Notas de ejecución" }
              ]
            };
          }
          return r;
        });
        save({ ...data, rutinas: actualizadas });
      };

      const handleEliminarEjercicio = (rutinaId, ejIdx) => {
        const actualizadas = data.rutinas.map(r => {
          if (r.id === rutinaId) {
            return {
              ...r,
              ejercicios: r.ejercicios.filter((_, idx) => idx !== ejIdx)
            };
          }
          return r;
        });
        save({ ...data, rutinas: actualizadas });
      };

      return html`<div class="p-4 space-y-6">
        <div>
          <h2 style="font-size:26px;font-weight:900;color:${D.text}">Tus Rutinas</h2>
          <p style="font-size:13px;color:${D.dim}">Modifica ejercicios, series y repeticiones a tu medida.</p>
        </div>

        <div class="space-y-4">
          ${data.rutinas.map(rut => {
            const isEditing = editMode === rut.id;
            return html`<div style="background:${D.card};border:1px solid ${isEditing ? D.lime : D.line};border-radius:20px;padding:18px" key=${rut.id}>
              <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:14px">
                <div>
                  <span style="font-size:10px;background:${D.surface};border:1px solid ${D.line};color:${D.dim};padding:2px 8px;border-radius:8px;font-weight:bold;text-transform:uppercase">${rut.dia}</span>
                  <h3 style="font-size:18px;font-weight:800;color:${D.text};margin-top:4px">${rut.nombre}</h3>
                </div>
                <button onClick=${() => setEditMode(isEditing ? null : rut.id)}
                  style="background:${isEditing ? D.lime : D.surface};color:${isEditing ? D.bg : D.text};border:1px solid ${D.line};padding:6px 12px;border-radius:10px;font-size:12px;font-weight:600">
                  ${isEditing ? "Guardar" : "Editar"}
                </button>
              </div>

              <div class="space-y-3">
                ${rut.ejercicios.map((ej, ejIdx) => {
                  return html`<div style="background:${D.surface};border:1px solid ${D.line};border-radius:12px;padding:12px" key=${ejIdx}>
                    ${isEditing ? html`<div class="space-y-2">
                      <div class="flex justify-between items-center gap-2">
                        <input type="text" value=${ej.nombre} onInput=${(e) => handleModificarEjercicio(rut.id, ejIdx, "nombre", e.target.value)}
                          style="flex:1;font-size:13px;padding:6px 10px;border-radius:8px;background:${D.card}"/>
                        <button onClick=${() => handleEliminarEjercicio(rut.id, ejIdx)} style="color:${D.rose};font-size:18px;padding:4px">
                          <i class="ti ti-trash"></i>
                        </button>
                      </div>
                      <div class="grid grid-cols-3 gap-2">
                        <div>
                          <label style="font-size:10px;color:${D.dim}">Series</label>
                          <input type="number" value=${ej.series} onInput=${(e) => handleModificarEjercicio(rut.id, ejIdx, "series", parseInt(e.target.value) || 0)}
                            style="width:100%;font-size:12px;padding:6px;background:${D.card}"/>
                        </div>
                        <div>
                          <label style="font-size:10px;color:${D.dim}">Reps</label>
                          <input type="text" value=${ej.reps} onInput=${(e) => handleModificarEjercicio(rut.id, ejIdx, "reps", e.target.value)}
                            style="width:100%;font-size:12px;padding:6px;background:${D.card}"/>
                        </div>
                        <div>
                          <label style="font-size:10px;color:${D.dim}">Descanso (s)</label>
                          <input type="number" value=${ej.descanso} onInput=${(e) => handleModificarEjercicio(rut.id, ejIdx, "descanso", parseInt(e.target.value) || 0)}
                            style="width:100%;font-size:12px;padding:6px;background:${D.card}"/>
                        </div>
                      </div>
                      <div>
                        <label style="font-size:10px;color:${D.dim}">Notas</label>
                        <input type="text" value=${ej.notas || ""} onInput=${(e) => handleModificarEjercicio(rut.id, ejIdx, "notas", e.target.value)}
                          style="width:100%;font-size:12px;padding:6px;background:${D.card}" placeholder="Notas de ejecución"/>
                      </div>
                    </div>` : html`<div>
                      <div style="display:flex;justify-content:space-between;align-items:center">
                        <span style="font-size:14px;font-weight:700;color:${D.text}">${ej.nombre}</span>
                        <span style="font-size:13px;color:${D.lime};font-weight:600">${ej.series}x${ej.reps}</span>
                      </div>
                      ${ej.notas && html`<p style="font-size:11px;color:${D.dim};margin-top:4px"><i class="ti ti-info-circle" style="color:${D.lime}"></i> ${ej.notas}</p>`}
                    </div>`}
                  </div>`;
                })}

                ${isEditing && html`<button onClick=${() => handleAgregarEjercicio(rut.id)}
                  style="width:100%;border:1px dashed ${D.line};border-radius:12px;padding:10px;text-align:center;font-size:12px;color:${D.dim};font-weight:600">
                  + Añadir Ejercicio
                </button>`}
              </div>
            </div>`;
          })}
        </div>
      </div>`;
    }

    // ── STREAMING_CHUNK: Diet and Food registration ──
    function Comidas({ data, save, customFoods, addCustomFood, removeCustomFood }) {
      const hk = hoyKey();
      const comidasHoy = data.comidas[hk]?.list || [];
      const [manual, setManual] = useState({ n: "", cal: "", p: "", c: "", gr: "" });

      const registrarAlimento = (food) => {
        const hLog = data.comidas[hk] || { cal: 0, prot: 0, carbs: 0, grasa: 0, list: [] };
        const newList = [...hLog.list, { ...food, id: Date.now().toString() }];
        
        // Recalcular totales diarios
        const tot = newList.reduce((acc, x) => {
          acc.cal += x.cal;
          acc.p += x.p;
          acc.c += x.c;
          acc.gr += x.gr;
          return acc;
        }, { cal: 0, p: 0, c: 0, gr: 0 });

        save({
          ...data,
          comidas: {
            ...data.comidas,
            [hk]: { ...tot, list: newList }
          }
        });
      };

      const borrarAlimentoLog = (foodId) => {
        const hLog = data.comidas[hk] || { cal: 0, prot: 0, carbs: 0, grasa: 0, list: [] };
        const newList = hLog.list.filter(x => x.id !== foodId);
        
        const tot = newList.reduce((acc, x) => {
          acc.cal += x.cal;
          acc.p += x.p;
          acc.c += x.c;
          acc.gr += x.gr;
          return acc;
        }, { cal: 0, p: 0, c: 0, gr: 0 });

        save({
          ...data,
          comidas: {
            ...data.comidas,
            [hk]: { ...tot, list: newList }
          }
        });
      };

      const handleGuardarBiblioteca = () => {
        if (!manual.n || !manual.cal) return;
        const foodItem = {
          n: manual.n,
          g: "1 ración",
          cal: parseInt(manual.cal) || 0,
          p: parseInt(manual.p) || 0,
          c: parseInt(manual.c) || 0,
          gr: parseInt(manual.gr) || 0
        };
        addCustomFood(foodItem);
        setManual({ n: "", cal: "", p: "", c: "", gr: "" });
      };

      return html`<div class="p-4 space-y-6">
        <div>
          <h2 style="font-size:26px;font-weight:900;color:${D.text}">Registro de Dieta</h2>
          <p style="font-size:13px;color:${D.dim}">Sincronizado con Sheets. Biblioteca de alimentos alternativa local.</p>
        </div>

        <!-- Formulario Manual & Guardar en Base de Datos alternativa -->
        <div style="background:${D.card};border:1px solid ${D.line};border-radius:24px;padding:18px" class="space-y-4">
          <h3 style="font-size:14px;font-weight:700;color:${D.text}">Añadir / Guardar Alimento</h3>
          <div class="grid grid-cols-2 gap-3">
            <div class="col-span-2">
              <input type="text" placeholder="Nombre" value=${manual.n} onInput=${(e) => setManual({ ...manual, n: e.target.value })} style="width:100%"/>
            </div>
            <div>
              <input type="number" placeholder="Kcal" value=${manual.cal} onInput=${(e) => setManual({ ...manual, cal: e.target.value })} style="width:100%"/>
            </div>
            <div>
              <input type="number" placeholder="Proteína (g)" value=${manual.p} onInput=${(e) => setManual({ ...manual, p: e.target.value })} style="width:100%"/>
            </div>
            <div>
              <input type="number" placeholder="Carbos (g)" value=${manual.c} onInput=${(e) => setManual({ ...manual, c: e.target.value })} style="width:100%"/>
            </div>
            <div>
              <input type="number" placeholder="Grasa (g)" value=${manual.gr} onInput=${(e) => setManual({ ...manual, gr: e.target.value })} style="width:100%"/>
            </div>
          </div>
          <div class="flex gap-2">
            <button onClick=${() => {
              if (!manual.n || !manual.cal) return;
              registrarAlimento({
                n: manual.n,
                g: "1 ración",
                cal: parseInt(manual.cal) || 0,
                p: parseInt(manual.p) || 0,
                c: parseInt(manual.c) || 0,
                gr: parseInt(manual.gr) || 0
              });
              setManual({ n: "", cal: "", p: "", c: "", gr: "" });
            }} style="flex:1;background:${D.lime};color:${D.bg};font-weight:700;padding:12px;border-radius:12px;font-size:13px" class="press">
              Registrar Hoy
            </button>
            <button onClick=${handleGuardarBiblioteca} style="background:${D.surface};border:1px solid ${D.line};color:${D.text};font-weight:600;padding:12px;border-radius:12px;font-size:13px" class="press">
              Guardar biblioteca
            </button>
          </div>
        </div>

        <!-- Alimentos consumidos hoy -->
        <div style="background:${D.card};border:1px solid ${D.line};border-radius:24px;padding:18px" class="space-y-3">
          <h3 style="font-size:14px;font-weight:700;color:${D.text}">Consumido Hoy</h3>
          ${comidasHoy.length === 0 ? html`<p style="font-size:13px;color:${D.faint};text-align:center;padding:12px">No has registrado alimentos hoy.</p>` : comidasHoy.map(c => {
            return html`<div style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid ${D.line};padding:8px 0;last:border-0" key=${c.id}>
              <div>
                <p style="font-size:14px;font-weight:700">${c.n}</p>
                <p style="font-size:11px;color:${D.dim}">P: ${c.p}g · C: ${c.c}g · G: ${c.gr}g · ${c.cal} kcal</p>
              </div>
              <button onClick=${() => borrarAlimentoLog(c.id)} style="color:${D.rose};padding:6px">
                <i class="ti ti-x"></i>
              </button>
            </div>`;
          })}
        </div>

        <!-- Biblioteca alternativa de alimentos -->
        <div class="space-y-3">
          <h3 style="font-size:14px;font-weight:700;color:${D.text}">Tu Biblioteca de Alimentos</h3>
          <div class="space-y-2">
            ${customFoods.length === 0 ? html`<p style="font-size:12px;color:${D.faint}">Sin alimentos guardados en la biblioteca de dieta.</p>` : customFoods.map((f, idx) => {
              return html`<div style="background:${D.card};border:1px solid ${D.line};border-radius:16px;padding:12px;display:flex;justify-content:space-between;align-items:center" key=${idx}>
                <div>
                  <p style="font-size:13px;font-weight:700">${f.n}</p>
                  <p style="font-size:11px;color:${D.dim}">${f.cal} kcal · P: ${f.p}g · C: ${f.c}g · G: ${f.gr}g</p>
                </div>
                <div class="flex gap-2">
                  <button onClick=${() => registrarAlimento(f)} style="background:${D.lime}15;color:${D.lime};font-weight:bold;font-size:11px;padding:6px 12px;border-radius:8px">
                    Añadir
                  </button>
                  <button onClick=${() => removeCustomFood(idx)} style="color:${D.rose};padding:4px">
                    <i class="ti ti-trash"></i>
                  </button>
                </div>
              </div>`;
            })}
          </div>
        </div>

        <!-- Alimentos por defecto -->
        <div class="space-y-3">
          <h3 style="font-size:14px;font-weight:700;color:${D.text}">Alimentos Sugeridos</h3>
          <div class="space-y-2">
            ${DEFAULT_ALIMENTOS.map(f => {
              return html`<div style="background:${D.card};border:1px solid ${D.line};border-radius:16px;padding:12px;display:flex;justify-content:space-between;align-items:center" key=${f.n}>
                <div>
                  <p style="font-size:13px;font-weight:700">${f.n} <span style="font-size:10px;color:${D.dim}">(${f.g})</span></p>
                  <p style="font-size:11px;color:${D.dim}">${f.cal} kcal · P: ${f.p}g · C: ${f.c}g · G: ${f.gr}g</p>
                </div>
                <button onClick=${() => registrarAlimento(f)} style="background:${D.lime}15;color:${D.lime};font-weight:bold;font-size:11px;padding:6px 12px;border-radius:8px">
                  Añadir
                </button>
              </div>`;
            })}
          </div>
        </div>
      </div>`;
    }

    // ── STREAMING_CHUNK: Training session tracker ──
    function Entreno({ data, save, setView }) {
      const hoy = hoyKey();
      const diaActivoIndice = data.diaCicloActivo ?? 0;
      const rId = data.ciclo[diaActivoIndice];
      const rut = data.rutinas.find(r => r.id === rId);

      if (!rut) {
        return html`<div class="p-4 text-center space-y-4">
          <p>Hoy no tienes entrenamiento programado en tu ciclo.</p>
          <button onClick=${() => setView("dashboard")} style="background:${D.lime};color:${D.bg};padding:10px;border-radius:10px">Volver</button>
        </div>`;
      }

      const sess = loadSession(hoy) || { sets: {}, pesos: {} };
      const [sets, setSets] = useState(sess.sets || {});
      const [pesos, setPesos] = useState(sess.pesos || {});
      const [timer, setTimer] = useState(null);

      useEffect(() => {
        saveSession({ fecha: hoy, sets, pesos });
      }, [sets, pesos]);

      const toggleSet = (ejIdx, sIdx, descanso) => {
        const arr = sets[ejIdx] || Array(rut.ejercicios[ejIdx].series).fill(false);
        const nv = [...arr];
        nv[sIdx] = !nv[sIdx];
        setSets({ ...sets, [ejIdx]: nv });

        if (nv[sIdx] && descanso > 0) {
          setTimer(descanso);
        }
      };

      const finalizarSesion = () => {
        const entLog = {
          rutina: rut.nombre,
          fecha: hoy,
          sets: sets,
          pesos: pesos
        };

        const nuevosRegistros = { ...data.registros, [hoy]: entLog };
        // Avanzamos automáticamente al siguiente día del ciclo de 7 días
        const siguienteDia = (diaActivoIndice + 1) % 7;

        save({
          ...data,
          registros: nuevosRegistros,
          racha: data.racha + 1,
          mejorRacha: Math.max(data.mejorRacha, data.racha + 1),
          diaCicloActivo: siguienteDia
        });
        localStorage.removeItem(SESSION_KEY);
        setView("dashboard");
      };

      return html`<div class="p-4 space-y-6">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <span style="font-size:10px;color:${rut.acento};font-weight:bold;text-transform:uppercase">Día ${diaActivoIndice + 1} del ciclo</span>
            <h2 style="font-size:24px;font-weight:900;color:${D.text}">${rut.nombre}</h2>
          </div>
          <button onClick=${() => setView("dashboard")} style="color:${D.dim};font-size:22px;padding:6px">
            <i class="ti ti-x"></i>
          </button>
        </div>

        ${timer !== null && html`<div class="fade" style="background:${D.card};border:1px solid ${D.lime}33;border-radius:20px;padding:16px">
          <${Timer} segundos=${timer} onDone=${() => { setTimer(null); sonarBeep(); }} color=${rut.acento}/>
        </div>`}

        <div class="space-y-4">
          ${rut.ejercicios.map((ej, ejIdx) => {
            const arr = sets[ejIdx] || Array(ej.series).fill(false);
            return html`<div style="background:${D.card};border:1px solid ${D.line};border-radius:20px;padding:16px" key=${ejIdx}>
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                <div>
                  <h4 style="font-size:15px;font-weight:800">${ej.nombre}</h4>
                  <p style="font-size:11px;color:${D.dim}">${ej.series} series x ${ej.reps} reps · Descanso: ${ej.descanso}s</p>
                </div>
              </div>

              <!-- Registro rápido de pesos de serie -->
              <div style="display:flex;gap:8px;margin-bottom:12px">
                <input type="text" placeholder="Peso usado (Ej: 20kg)" value=${pesos[ejIdx] || ""}
                  onInput=${(e) => setPesos({ ...pesos, [ejIdx]: e.target.value })}
                  style="flex:1;font-size:13px;padding:6px 10px;border-radius:8px"/>
              </div>

              <!-- Selector de series completadas -->
              <div class="grid grid-cols-5 gap-2">
                ${Array.from({ length: ej.series }).map((_, sIdx) => {
                  const done = arr[sIdx];
                  return html`<button onClick=${() => toggleSet(ejIdx, sIdx, ej.descanso)}
                    style="padding:10px;border-radius:10px;font-weight:bold;font-size:12px;background:${done ? D.lime : D.surface};color:${done ? D.bg : D.text};border:1px solid ${D.line}">
                    S${sIdx + 1}
                  </button>`;
                })}
              </div>
            </div>`;
          })}
        </div>

        <button onClick=${finalizarSesion} style="width:100%;background:${D.lime};color:${D.bg};font-weight:800;padding:14px;border-radius:16px;font-size:15px" class="press">
          Terminar y Guardar Entrenamiento
        </button>
      </div>`;
    }

    // ── STREAMING_CHUNK: Descanso timer inside training ──
    function Timer({ segundos, onDone, color }) {
      const [t, setT] = useState(segundos);
      const [run, setRun] = useState(true);
      const ref = useRef();

      useEffect(() => {
        if (run && t > 0) ref.current = setTimeout(() => setT(t - 1), 1000);
        else if (t === 0) onDone?.();
        return () => clearTimeout(ref.current);
      }, [t, run]);

      const pct = ((segundos - t) / segundos) * 100;
      const min = Math.floor(t / 60);
      const sec = t % 60;

      return html`<div style="display:flex;align-items:center;gap:16px">
        <div style="position:relative;width:90px;height:90px;flex-shrink:0">
          <svg width="90" height="90" style="transform:rotate(-90deg)">
            <circle cx="45" cy="45" r="38" fill="none" stroke=${D.line} stroke-width="6"/>
            <circle cx="45" cy="45" r="38" fill="none" stroke=${color} stroke-width="6" stroke-linecap="round"
              stroke-dasharray="238.7" stroke-dashoffset=${238.7 - (pct / 100) * 238.7} style="transition:stroke-dashoffset 1s linear"/>
          </svg>
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;color:${color}">
            ${min}:${String(sec).padStart(2, "0")}
          </div>
        </div>
        <div style="flex:1">
          <p style="font-size:11px;color:${D.faint};text-transform:uppercase;letter-spacing:1px">Descanso</p>
          <p style="font-size:14px;font-weight:700;color:${D.text}">${t === 0 ? "¡Listo!" : "Respira profundamente"}</p>
          <div class="flex gap-2 mt-2">
            <button onClick=${() => setRun(!run)} style="font-size:11px;background:${D.surface};padding:4px 8px;border-radius:6px;border:1px solid ${D.line}">${run ? "Pausar" : "Seguir"}</button>
            <button onClick=${() => setT(0)} style="font-size:11px;background:${D.surface};padding:4px 8px;border-radius:6px;border:1px solid ${D.line}">Saltar</button>
          </div>
        </div>
      </div>`;
    }

    // ── STREAMING_CHUNK: Progress and goals chart ──
    function Progreso({ data, save }) {
      const hk = hoyKey();
      const [nuevoPeso, setNuevoPeso] = useState("");

      const registrarPesoHoy = () => {
        if (!nuevoPeso) return;
        const pesoNum = parseFloat(nuevoPeso);
        if (pesoNum > 20) {
          const actualizados = { ...data.pesoCorporal, [hk]: pesoNum };
          save({
            ...data,
            profile: { ...data.profile, peso: pesoNum },
            pesoCorporal: actualizados
          });
          setNuevoPeso("");
        }
      };

      return html`<div class="p-4 space-y-6">
        <div>
          <h2 style="font-size:26px;font-weight:900;color:${D.text}">Progreso Corporal</h2>
          <p style="font-size:13px;color:${D.dim}">Controla tus medidas y peso diario en Sheets.</p>
        </div>

        <div style="background:${D.card};border:1px solid ${D.line};border-radius:24px;padding:18px" class="space-y-4">
          <h3 style="font-size:14px;font-weight:700;color:${D.text}">Registrar Peso Hoy</h3>
          <div class="flex gap-2">
            <input type="number" step="0.1" placeholder="Ej: 71.5 kg" value=${nuevoPeso} onInput=${(e) => setNuevoPeso(e.target.value)} style="flex:1"/>
            <button onClick=${registrarPesoHoy} style="background:${D.lime};color:${D.bg};font-weight:bold;padding:12px 18px;border-radius:12px;font-size:13px" class="press">
              Añadir
            </button>
          </div>
        </div>

        <div style="background:${D.card};border:1px solid ${D.line};border-radius:24px;padding:18px" class="space-y-3">
          <h3 style="font-size:14px;font-weight:700;color:${D.text}">Historial de Peso Registrado</h3>
          <div class="space-y-2">
            ${Object.keys(data.pesoCorporal).length === 0 ? html`<p style="font-size:12px;color:${D.faint};text-align:center">Aún no hay registros de peso.</p>` : Object.entries(data.pesoCorporal).sort((a, b) => b[0].localeCompare(a[0])).slice(0, 10).map(([f, p]) => {
              return html`<div style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid ${D.line};padding:8px 0" key=${f}>
                <span style="font-size:13px;color:${D.dim}">${f}</span>
                <span style="font-size:14px;font-weight:bold;color:${D.lime}">${p} kg</span>
              </div>`;
            })}
          </div>
        </div>
      </div>`;
    }

    // ── STREAMING_CHUNK: Setup / Goals configuration view ──
    function Ajustes({ data, save, logout, customFoods, email, syncing }) {
      return html`<div class="p-4 space-y-6">
        <div>
          <h2 style="font-size:26px;font-weight:900;color:${D.text}">Ajustes</h2>
          <p style="font-size:13px;color:${D.dim}">Define tus metas diarias, peso corporal ideal y revisa la base de datos.</p>
        </div>

        <!-- Metas nutricionales -->
        <div style="background:${D.card};border:1px solid ${D.line};border-radius:24px;padding:20px" class="space-y-4">
          <h3 style="font-size:14px;font-weight:700;color:${D.text}">Objetivos Nutricionales</h3>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label style="font-size:11px;color:${D.dim}">Calorías Diarias</label>
              <input type="number" value=${data.metas.calorias} onInput=${(e) => save({ ...data, metas: { ...data.metas, calorias: parseInt(e.target.value) || 0 } })} style="width:100%"/>
            </div>
            <div>
              <label style="font-size:11px;color:${D.dim}">Agua Diaria (L)</label>
              <input type="number" step="0.1" value=${data.metas.agua} onInput=${(e) => save({ ...data, metas: { ...data.metas, agua: parseFloat(e.target.value) || 0 } })} style="width:100%"/>
            </div>
            <div>
              <label style="font-size:11px;color:${D.dim}">Proteínas (g)</label>
              <input type="number" value=${data.metas.proteina} onInput=${(e) => save({ ...data, metas: { ...data.metas, proteina: parseInt(e.target.value) || 0 } })} style="width:100%"/>
            </div>
            <div>
              <label style="font-size:11px;color:${D.dim}">Carbohidratos (g)</label>
              <input type="number" value=${data.metas.carbs} onInput=${(e) => save({ ...data, metas: { ...data.metas, carbs: parseInt(e.target.value) || 0 } })} style="width:100%"/>
            </div>
            <div>
              <label style="font-size:11px;color:${D.dim}">Grasa (g)</label>
              <input type="number" value=${data.metas.grasa} onInput=${(e) => save({ ...data, metas: { ...data.metas, grasa: parseInt(e.target.value) || 0 } })} style="width:100%"/>
            </div>
            <div>
              <label style="font-size:11px;color:${D.dim}">Peso Objetivo (kg)</label>
              <input type="number" step="0.1" value=${data.metas.pesoObjetivo} onInput=${(e) => save({ ...data, metas: { ...data.metas, pesoObjetivo: parseFloat(e.target.value) || 0 } })} style="width:100%"/>
            </div>
          </div>
        </div>

        <!-- Visor limpio de la base de datos local y sincronizada -->
        <div style="background:${D.card};border:1px solid ${D.line};border-radius:24px;padding:20px" class="space-y-3">
          <h3 style="font-size:14px;font-weight:700;color:${D.text}">Visor de Base de Datos</h3>
          <p class="text-xs text-[#8a8a9a]">Estado bruto actual de la dieta guardada localmente y tu hoja OuryFit.</p>
          
          <div style="background:#0a0a0f;padding:12px;border-radius:12px;border:1px solid ${D.line};max-height:160px;overflow-y:auto">
            <pre style="font-size:10px;color:${D.cyan};font-family:monospace">
${JSON.stringify({
  email_activo: email || "Sin vincular",
  estado_sincronizacion: syncing ? "Sincronizando..." : "Sincronizado",
  alimentos_guardados_dieta: customFoods.length,
  comidas_logueadas_hoy: data.comidas[hoyKey()]?.list || [],
  ciclo_actual: data.ciclo,
  dia_ciclo_hoy: (data.diaCicloActivo ?? 0) + 1
}, null, 2)}
            </pre>
          </div>
        </div>

        <div class="space-y-2">
          <button onClick=${() => {
            const backup = JSON.stringify({ data, customFoods }, null, 2);
            const blob = new Blob([backup], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `OuryFit_Diet_Backup_${hoyKey()}.json`;
            a.click();
          }} style="width:100%;border:1px solid ${D.line};padding:12px;border-radius:12px;font-size:13px;font-weight:600;color:${D.text}">
            Descargar copia de seguridad dieta
          </button>
          
          <button onClick=${logout} style="width:100%;background:${D.rose}15;color:${D.rose};padding:12px;border-radius:12px;font-size:13px;font-weight:700" class="press">
            Cerrar Sesión Google Sheets
          </button>
        </div>
      </div>`;
    }

    // ── STREAMING_CHUNK: Main App Wrapper with routing ──
    function App() {
      const { data, save, loaded, email, handleGoogleLogin, logout, authError, syncing, customFoods, addCustomFood, removeCustomFood } = useStore();
      const [view, setView] = useState("dashboard"); // dashboard, rutinas, comidas, progreso, ajustes, entreno

      if (!loaded) {
        return html`<div class="h-screen flex flex-col items-center justify-center gap-4 bg-[#0a0a0f] text-[#f4f4f7]">
          <${Spinner} size=${36}/>
          <div style="color:${D.dim};font-size:13px">Bienvenido de vuelta...</div>
        </div>`;
      }

      if (!email) {
        return html`<${LoginScreen} onLogin=${handleGoogleLogin} error=${authError}/>`;
      }

      return html`<div style="min-height:100vh;background-color:${D.bg};color:${D.text};display:flex;flex-direction:column;max-width:480px;margin:0 auto;border-left:1px solid ${D.line};border-right:1px solid ${D.line};padding-bottom:80px">
        
        <!-- Header status bar -->
        <header style="display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid ${D.line};background:${D.bg}">
          <div style="display:flex;align-items:center;gap:8px">
            <div style="width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,${D.lime},${D.limeDark});display:flex;align-items:center;justify-content:center">
              <i class="ti ti-bolt text-black font-bold"></i>
            </div>
            <span style="font-weight:900;font-size:15px;letter-spacing:0.5px">OURYFIT <span style="color:${D.lime};font-size:10px;font-weight:normal">PRO</span></span>
          </div>
          <span style="font-size:10px;background:${D.surface};border:1px solid ${D.line};padding:4px 8px;border-radius:8px;color:${D.dim};display:flex;align-items:center;gap:4px">
            <span style="width:6px;height:6px;border-radius:50%;background:${syncing ? D.rose : D.lime};animation:${syncing ? "spin 1s infinite" : "none"}"></span>
            ${syncing ? "Subiendo..." : "Guardado en Sheets"}
          </span>
        </header>

        <main class="flex-grow">
          ${view === "dashboard" && html`<${Dashboard} data=${data} save=${save} setView=${setView} customFoods=${customFoods}/>`}
          ${view === "rutinas" && html`<${Rutinas} data=${data} save=${save}/>`}
          ${view === "comidas" && html`<${Comidas} data=${data} save=${save} customFoods=${customFoods} addCustomFood=${addCustomFood} removeCustomFood=${removeCustomFood}/>`}
          ${view === "progreso" && html`<${Progreso} data=${data} save=${save}/>`}
          ${view === "ajustes" && html`<${Ajustes} data=${data} save=${save} logout=${logout} customFoods=${customFoods} email=${email} syncing=${syncing}/>`}
          ${view === "entreno" && html`<${Entreno} data=${data} save=${save} setView=${setView}/>`}
        </main>

        <!-- Navigation bar -->
        <nav style="position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:${D.bg}EE;backdrop-filter:blur(10px);border-top:1px solid ${D.line};display:flex;justify-content:space-around;padding:10px 0;z-index:40">
          ${[
            { id: "dashboard", label: "Inicio", icon: "ti-smart-home" },
            { id: "rutinas", label: "Rutinas", icon: "ti-barbell" },
            { id: "comidas", label: "Dieta", icon: "ti-apple" },
            { id: "progreso", label: "Progreso", icon: "ti-chart-line" },
            { id: "ajustes", label: "Ajustes", icon: "ti-settings" }
          ].map(tab => {
            const active = view === tab.id;
            return html`<button onClick=${() => setView(tab.id)} style="display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:${active ? D.lime : D.dim};cursor:pointer" key=${tab.id}>
              <i class="ti ${tab.icon}" style="font-size:22px;color:${active ? D.lime : D.dim}"></i>
              <span style="font-size:10px;font-weight:${active ? "700" : "400"}">${tab.label}</span>
            </button>`;
          })}
        </nav>
      </div>`;
    }

    render(html`<${App} />`, document.getElementById("root"));
  </script>
</body>
</html>
