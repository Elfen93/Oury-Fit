<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <meta name="theme-color" content="#0a0a0f"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="OuryFit"/>
  <title>OuryFit</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <script src="https://accounts.google.com/gsi/client" async></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;background:#0a0a0f;font-family:system-ui,-apple-system,sans-serif}
    button,input{font-family:inherit}
    ::-webkit-scrollbar{width:0;height:0}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .fade{animation:fadeIn 0.4s ease both}
    .press{transition:transform 0.1s ease}
    .press:active{transform:scale(0.96)}
    input{background:#13131c;border:1px solid #2a2a38;color:#f4f4f7;border-radius:12px;padding:12px 14px;font-size:15px;outline:none;transition:border-color 0.2s}
    input:focus{border-color:#c4f542}
    input::placeholder{color:#56566a}
  </style>
</head>
<body>
  <div id="root">
    <div style="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px">
      <div style="width:36px;height:36px;border:3px solid #2a2a38;border-top-color:#c4f542;border-radius:50%;animation:spin 0.8s linear infinite"></div>
      <div style="color:#56566a;font-size:13px">Iniciando OuryFit...</div>
    </div>
  </div>

  <script type="module">
    import { h, render } from 'https://esm.sh/preact@10.19.3';
    import { useState, useEffect, useRef, useCallback } from 'https://esm.sh/preact@10.19.3/hooks';
    import htm from 'https://esm.sh/htm@3.1.1';
    const html = htm.bind(h);

    // ── Config ──────────────────────────────────────────────────
    const KEY = "OuryFitV8";
    const SESSION_KEY = "ouryfit_session";
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby2MVp5us_qC2b8tcO9tToz1EGP4408yVnCqpN2G6BmfuWQQnQ2zkQacMDnc5oJo5IQuw/exec";
    const CLIENT_ID = "362581552628-qroeqtmtj5sfvd3o15fp0o0ueitdu0av.apps.googleusercontent.com";

    const D = {
      bg:"#0a0a0f",surface:"#13131c",card:"#1a1a26",cardHi:"#22222f",
      line:"#2a2a38",text:"#f4f4f7",dim:"#8a8a9a",faint:"#56566a",
      lime:"#c4f542",limeDark:"#9bd119",violet:"#8b5cf6",
      cyan:"#22d3ee",amber:"#fbbf24",rose:"#fb7185",
    };

    const defaultData = {
      profile:{name:"Oury",peso:0,altura:0,edad:25,setup:false},
      semana:1,racha:0,mejorRacha:0,
      registros:{},comidas:{},agua:{},pesoCorporal:{},records:{},
      metas:{calorias:2950,proteina:140,carbs:370,grasa:85,agua:3.5,pesoObjetivo:73},
    };

    const RUTINA = [
      {dia:"Lunes",nombre:"Pecho + Tríceps",corto:"Empuje",icon:"ti-barbell",acento:D.lime,ejercicios:[
        {nombre:"Press banca plano",series:4,reps:"8-10",descanso:90,notas:"Baja controlado 3s, no rebotes"},
        {nombre:"Press inclinado mancuernas",series:3,reps:"10-12",descanso:75,notas:"Codos a 45°"},
        {nombre:"Aperturas en máquina",series:3,reps:"12-15",descanso:60,notas:"Aprieta el pecho al cerrar"},
        {nombre:"Fondos en paralelas",series:3,reps:"10-12",descanso:60,notas:"Inclínate hacia adelante"},
        {nombre:"Press francés",series:3,reps:"10-12",descanso:60,notas:"Codos quietos, solo antebrazo"},
      ]},
      {dia:"Martes",nombre:"Espalda + Bíceps",corto:"Tirón",icon:"ti-stretching",acento:D.cyan,ejercicios:[
        {nombre:"Jalón al pecho",series:4,reps:"8-10",descanso:90,notas:"Lleva el pecho hacia la barra"},
        {nombre:"Remo con barra",series:4,reps:"8-10",descanso:90,notas:"Espalda recta, tira al ombligo"},
        {nombre:"Remo en polea sentado",series:3,reps:"12-15",descanso:60,notas:"Junta las escápulas"},
        {nombre:"Curl bíceps con barra",series:3,reps:"10-12",descanso:60,notas:"Sin balanceo, codos fijos"},
        {nombre:"Curl martillo",series:3,reps:"12-15",descanso:60,notas:"Trabaja el braquial"},
      ]},
      {dia:"Jueves",nombre:"Piernas completas",corto:"Pierna",icon:"ti-run",acento:D.violet,ejercicios:[
        {nombre:"Sentadilla en Smith",series:4,reps:"8-10",descanso:120,notas:"Baja hasta paralelo"},
        {nombre:"Prensa de piernas",series:4,reps:"10-12",descanso:90,notas:"No bloquees rodillas"},
        {nombre:"Extensión de cuádriceps",series:3,reps:"15-20",descanso:60,notas:"Pausa 1s en contracción"},
        {nombre:"Curl femoral tumbado",series:3,reps:"12-15",descanso:60,notas:"Talón hacia el glúteo"},
        {nombre:"Elevación de gemelos",series:4,reps:"20-25",descanso:45,notas:"Rango completo"},
      ]},
      {dia:"Viernes",nombre:"Hombros + Core",corto:"Hombro",icon:"ti-flame",acento:D.amber,ejercicios:[
        {nombre:"Press militar máquina",series:4,reps:"8-10",descanso:90,notas:"No arquees la zona lumbar"},
        {nombre:"Elevaciones laterales",series:4,reps:"12-15",descanso:60,notas:"Sube hasta altura del hombro"},
        {nombre:"Pájaros en polea",series:3,reps:"15",descanso:60,notas:"Deltoides posterior"},
        {nombre:"Plancha",series:3,reps:"45s",descanso:45,notas:"Cuerpo en línea recta"},
        {nombre:"Crunch en máquina",series:3,reps:"15-20",descanso:45,notas:"Lento, sin tirones"},
      ]},
    ];

    const DIAS = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];
    const ALIMENTOS = [
      {n:"Pechuga de pollo",g:"100g",cal:165,p:31,c:0,gr:4},
      {n:"Arroz blanco cocido",g:"100g",cal:130,p:2.7,c:28,gr:0.3},
      {n:"Huevo entero",g:"1 ud",cal:78,p:6,c:0.6,gr:5},
      {n:"Avena",g:"50g",cal:190,p:6.5,c:33,gr:3.5},
      {n:"Plátano",g:"1 ud",cal:105,p:1.3,c:27,gr:0.4},
      {n:"Atún en lata",g:"100g",cal:116,p:26,c:0,gr:1},
      {n:"Batido de proteína",g:"1 scoop",cal:120,p:24,c:3,gr:1.5},
      {n:"Pasta cocida",g:"100g",cal:158,p:5.8,c:31,gr:0.9},
      {n:"Leche entera",g:"250ml",cal:150,p:8,c:12,gr:8},
      {n:"Aguacate",g:"1/2 ud",cal:160,p:2,c:9,gr:15},
      {n:"Crema de cacahuete",g:"30g",cal:188,p:8,c:6,gr:16},
      {n:"Ternera magra",g:"100g",cal:187,p:26,c:0,gr:9},
    ];
    const FRASES = [
      "El músculo se construye con consistencia.",
      "Hoy, más fuerte que ayer.",
      "No perfecto. Solo constante.",
      "Cada serie cuenta. Tú cuentas.",
      "La disciplina pesa gramos.",
      "Sigue. Eso es todo el secreto.",
    ];

    // ── Sheets API ───────────────────────────────────────────────
    async function sheetLoad(email) {
      const r = await fetch(`${SCRIPT_URL}?action=load&email=${encodeURIComponent(email)}`);
      const json = await r.json();
      if (json.status === "error") throw new Error(json.error);
      return json.data;
    }
    async function sheetSave(email, data) {
      await fetch(SCRIPT_URL, {method:"POST", body: JSON.stringify({action:"save",email,data})});
    }
    function sheetToApp(raw) {
      const perfil = raw.perfil || {};
      return {
        ...defaultData,
        profile: perfil.profile || defaultData.profile,
        semana: perfil.semana ?? 1,
        racha: perfil.racha ?? 0,
        mejorRacha: perfil.mejorRacha ?? 0,
        metas: perfil.metas || defaultData.metas,
        registros: raw.entrenos || {},
        comidas: raw.comidas || {},
        agua: raw.agua || {},
        pesoCorporal: raw.peso || {},
        records: raw.records || {},
      };
    }
    function appToSheet(data) {
      return {
        perfil: {profile:data.profile,semana:data.semana,racha:data.racha,mejorRacha:data.mejorRacha,metas:data.metas},
        entrenos: data.registros,
        comidas: data.comidas,
        agua: data.agua,
        peso: data.pesoCorporal,
        records: data.records,
      };
    }

    // ── Session ──────────────────────────────────────────────────
    function loadSession(hk) { try { const r=localStorage.getItem(SESSION_KEY); const s=r?JSON.parse(r):null; return s?.fecha===hk?s:null; } catch { return null; } }
    function saveSession(s) { try { localStorage.setItem(SESSION_KEY,JSON.stringify(s)); } catch {} }
    function clearSession() { try { localStorage.removeItem(SESSION_KEY); } catch {} }

    // ── Store ────────────────────────────────────────────────────
    function useStore() {
      const [data, setData] = useState(defaultData);
      const [loaded, setLoaded] = useState(false);
      const [email, setEmail] = useState(() => localStorage.getItem("ouryfit_email") || null);
      const [authError, setAuthError] = useState(null);
      const [syncing, setSyncing] = useState(false);
      const saveTimer = useRef(null);

      useEffect(() => {
        if (!email) return;
        setLoaded(false);
        sheetLoad(email).then(raw => {
          setData(sheetToApp(raw));
          setLoaded(true);
        }).catch(err => {
          if (err.message === "acceso_denegado") {
            setAuthError("acceso_denegado");
            localStorage.removeItem("ouryfit_email");
            setEmail(null);
          } else {
            const raw = localStorage.getItem(KEY);
            if (raw) setData({...defaultData,...JSON.parse(raw)});
            setLoaded(true);
          }
        });
      }, [email]);

      function handleGoogleLogin(response) {
        const payload = JSON.parse(atob(response.credential.split(".")[1]));
        const userEmail = payload.email;
        localStorage.setItem("ouryfit_email", userEmail);
        setAuthError(null);
        setEmail(userEmail);
      }

      function logout() {
        localStorage.removeItem("ouryfit_email");
        setEmail(null); setData(defaultData); setLoaded(false);
      }

      const save = useCallback((nd) => {
        setData(nd);
        try { localStorage.setItem(KEY, JSON.stringify(nd)); } catch {}
        if (saveTimer.current) clearTimeout(saveTimer.current);
        saveTimer.current = setTimeout(async () => {
          if (!email) return;
          setSyncing(true);
          try { await sheetSave(email, appToSheet(nd)); } catch {}
          setSyncing(false);
        }, 2000);
      }, [email]);

      return {data, save, loaded, email, handleGoogleLogin, logout, authError, syncing};
    }

    // ── Helpers ──────────────────────────────────────────────────
    const hoyKey = () => {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,"0");
      const day = String(d.getDate()).padStart(2,"0");
      return `${y}-${m}-${day}`;
    };
    const nombreDia = () => new Date().toLocaleDateString("es-ES",{weekday:"long"});

    function Ring({pct, size=130, stroke=11, color=D.lime}) {
      const r=(size-stroke)/2, circ=2*Math.PI*r, off=circ-(Math.min(100,pct)/100)*circ;
      return html`<svg width=${size} height=${size} style="transform:rotate(-90deg);filter:drop-shadow(0 0 8px ${color}55)">
        <circle cx=${size/2} cy=${size/2} r=${r} fill="none" stroke=${D.line} stroke-width=${stroke}/>
        <circle cx=${size/2} cy=${size/2} r=${r} fill="none" stroke=${color} stroke-width=${stroke}
          stroke-dasharray=${circ} stroke-dashoffset=${off} stroke-linecap="round"
          style="transition:stroke-dashoffset 0.9s cubic-bezier(0.16,1,0.3,1)"/>
      </svg>`;
    }

    function Bar({pct, color, h=6}) {
      return html`<div style="height:${h}px;background:${D.line};border-radius:99px;overflow:hidden">
        <div style="height:100%;width:${Math.min(100,pct)}%;background:${color};border-radius:99px;transition:width 0.7s ease;box-shadow:0 0 8px ${color}66"/>
      </div>`;
    }

    function Spinner({size=36,color=D.lime}) {
      return html`<div style="width:${size}px;height:${size}px;border:3px solid ${D.line};border-top-color:${color};border-radius:50%;animation:spin 0.8s linear infinite"/>`;
    }

    // ── Login ────────────────────────────────────────────────────
    function LoginScreen({onLogin, error}) {
      const [ready, setReady] = useState(false);

      useEffect(() => {
        let tries = 0;
        function tryInit() {
          if (window.google?.accounts?.id) {
            window.google.accounts.id.initialize({client_id:CLIENT_ID, callback:onLogin, ux_mode:"popup"});
            window.google.accounts.id.renderButton(document.getElementById("g_btn"), {theme:"filled_black",size:"large",width:260,text:"continue_with"});
            setReady(true);
          } else if (++tries < 40) setTimeout(tryInit, 300);
        }
        tryInit();
      }, []);

      return html`<div class="fade" style="background:${D.bg};min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;color:${D.text}">
        <div style="width:72px;height:72px;border-radius:22px;background:linear-gradient(135deg,${D.lime},${D.limeDark});display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px ${D.lime}55;margin-bottom:20px">
          <i class="ti ti-bolt" style="font-size:38px;color:${D.bg}"/>
        </div>
        <div style="font-size:30px;font-weight:800;letter-spacing:-1px;margin-bottom:4px">OURYFIT</div>
        <div style="font-size:14px;color:${D.dim};margin-bottom:40px">Tu plan, hecho a tu medida</div>

        ${error==="acceso_denegado" && html`<div style="background:#2a0f0f;border:1px solid ${D.rose}44;border-radius:14px;padding:12px 18px;margin-bottom:20px;font-size:13px;color:${D.rose};text-align:center;max-width:300px">
          Este email no tiene acceso a OuryFit.
        </div>`}

        <div style="background:${D.card};border:1px solid ${D.line};border-radius:20px;padding:28px;text-align:center;max-width:320px;width:100%">
          <div style="font-size:15px;font-weight:600;margin-bottom:6px">Entra con tu cuenta Google</div>
          <div style="font-size:13px;color:${D.dim};margin-bottom:24px">Tus datos se sincronizan en todos tus dispositivos.</div>
          <div id="g_btn" style="display:flex;justify-content:center;min-height:44px;align-items:center">
            ${!ready && html`<${Spinner} size=${24}/>`}
          </div>
        </div>
      </div>`;
    }

    // ── Setup ────────────────────────────────────────────────────
    function Setup({data, save}) {
      const [paso, setPaso] = useState(0);
      const [v, setV] = useState({peso:"",altura:"",edad:""});

      function fin() {
        const p=+v.peso,h=+v.altura,e=+v.edad||25;
        const bmr=Math.round(10*p+6.25*h-5*e+5);
        const cal=Math.round(bmr*1.55*1.1);
        const prot=Math.round(p*2),grasa=Math.round((cal*0.25)/9);
        const carbs=Math.round((cal-prot*4-grasa*9)/4);
        save({...data,profile:{name:"Oury",peso:p,altura:h,edad:e,setup:true},
          metas:{calorias:cal,proteina:prot,carbs,grasa,agua:Math.round(p*0.045*10)/10,pesoObjetivo:Math.round((p+3)*10)/10}});
      }

      const pasos=[
        {k:"peso",t:"Tu peso",s:"Para calcular calorías y proteína exactas",ph:"kg",icon:"ti-weight"},
        {k:"altura",t:"Tu altura",s:"Para el metabolismo basal",ph:"cm",icon:"ti-ruler-2"},
        {k:"edad",t:"Tu edad",s:"Último dato y arrancamos",ph:"años",icon:"ti-cake"},
      ];
      const cur=pasos[paso];
      const val=paso===0?+v.peso>30:paso===1?+v.altura>100:+v.edad>12;

      return html`<div style="background:${D.bg};min-height:100vh;color:${D.text};padding:3rem 1.5rem;max-width:440px;margin:0 auto">
        <div class="fade" style="text-align:center;margin-bottom:40px">
          <div style="width:72px;height:72px;border-radius:22px;background:linear-gradient(135deg,${D.lime},${D.limeDark});display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px ${D.lime}55;margin:0 auto 16px">
            <i class="ti ti-bolt" style="font-size:38px;color:${D.bg}"/>
          </div>
          <div style="font-size:30px;font-weight:800;letter-spacing:-1px">OURYFIT</div>
        </div>
        <div style="display:flex;gap:7px;margin-bottom:36px">
          ${[0,1,2].map(i=>html`<div style="flex:1;height:5px;border-radius:99px;background:${i<=paso?D.lime:D.line};transition:background 0.4s;box-shadow:${i<=paso?`0 0 10px ${D.lime}66`:'none'}"/>`)}
        </div>
        <div class="fade" key=${paso}>
          <div style="width:56px;height:56px;border-radius:16px;background:${D.card};border:1px solid ${D.line};display:flex;align-items:center;justify-content:center;margin-bottom:18px">
            <i class="ti ${cur.icon}" style="font-size:28px;color:${D.lime}"/>
          </div>
          <div style="font-size:26px;font-weight:700;letter-spacing:-0.5px">${cur.t}</div>
          <div style="font-size:14px;color:${D.dim};margin:4px 0 22px">${cur.s}</div>
          <input type="number" autofocus value=${v[cur.k]} onInput=${e=>setV({...v,[cur.k]:e.target.value})} placeholder=${cur.ph} style="width:100%;font-size:20px;font-weight:600"/>
        </div>
        <div style="display:flex;gap:10px;margin-top:28px">
          ${paso>0 && html`<button class="press" onClick=${()=>setPaso(paso-1)} style="padding:15px 24px;background:${D.card};color:${D.text};border:1px solid ${D.line};border-radius:14px;font-size:15px;cursor:pointer;font-weight:600">Atrás</button>`}
          <button class="press" disabled=${!val} onClick=${()=>paso<2?setPaso(paso+1):fin()}
            style="flex:1;padding:15px;background:${val?`linear-gradient(135deg,${D.lime},${D.limeDark})`:D.card};color:${val?D.bg:D.faint};border:none;border-radius:14px;font-size:15px;cursor:${val?'pointer':'default'};font-weight:700;box-shadow:${val?`0 8px 24px ${D.lime}44`:'none'}">
            ${paso<2?"Continuar":"Crear mi plan"}
          </button>
        </div>
      </div>`;
    }

    // ── Timer ────────────────────────────────────────────────────
    function Timer({segundos, onDone, color}) {
      const [t,setT]=useState(segundos),[run,setRun]=useState(true),ref=useRef();
      useEffect(()=>{
        if(run&&t>0) ref.current=setTimeout(()=>setT(t-1),1000);
        else if(t===0) onDone?.();
        return()=>clearTimeout(ref.current);
      },[t,run]);
      const pct=((segundos-t)/segundos)*100,min=Math.floor(t/60),sec=t%60;
      const cerca=t<=10&&t>0,listo=t===0,col=listo?D.lime:cerca?D.rose:color;
      const r=52,circ=2*Math.PI*r;
      return html`<div style="background:${D.card};border:1px solid ${col}44;border-radius:20px;padding:18px;display:flex;align-items:center;gap:18px;box-shadow:0 0 30px ${col}22">
        <div style="position:relative;width:124px;height:124px;flex-shrink:0">
          <svg width="124" height="124" style="transform:rotate(-90deg);filter:drop-shadow(0 0 6px ${col}66)">
            <circle cx="62" cy="62" r=${r} fill="none" stroke=${D.line} stroke-width="9"/>
            <circle cx="62" cy="62" r=${r} fill="none" stroke=${col} stroke-width="9" stroke-linecap="round"
              stroke-dasharray=${circ} stroke-dashoffset=${circ-(pct/100)*circ} style="transition:stroke-dashoffset 1s linear"/>
          </svg>
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:${col};font-variant-numeric:tabular-nums;letter-spacing:-1px">
            ${min}:${String(sec).padStart(2,"0")}
          </div>
        </div>
        <div style="flex:1">
          <div style="font-size:11px;color:${D.faint};text-transform:uppercase;letter-spacing:1.5px;font-weight:600">${listo?"A por la siguiente":"Descanso"}</div>
          <div style="font-size:16px;color:${D.text};font-weight:600;margin:3px 0 12px">${listo?"¡Listo!":cerca?"Casi...":"Respira y recupera"}</div>
          <div style="display:flex;gap:7px;flex-wrap:wrap">
            ${[[run?"Pausa":"Sigue",()=>setRun(!run)],["Reinicia",()=>{setT(segundos);setRun(true);}],["Salta",()=>setT(0)]].map(([l,fn])=>html`
              <button onClick=${fn} style="padding:8px 14px;font-size:12px;background:${D.cardHi};color:${D.text};border:1px solid ${D.line};border-radius:10px;cursor:pointer;font-weight:600">${l}</button>
            `)}
          </div>
        </div>
      </div>`;
    }

    // ── TopBar ───────────────────────────────────────────────────
    function TopBar({titulo, sub, onBack, acento}) {
      return html`<div style="display:flex;align-items:center;gap:13px;margin-bottom:22px">
        ${onBack && html`<button class="press" onClick=${onBack} style="width:42px;height:42px;padding:0;display:flex;align-items:center;justify-content:center;background:${D.card};border:1px solid ${D.line};border-radius:13px;cursor:pointer">
          <i class="ti ti-chevron-left" style="font-size:20px;color:${D.text}"/>
        </button>`}
        <div>
          ${sub && html`<div style="font-size:11px;color:${acento||D.lime};text-transform:uppercase;letter-spacing:1.5px;font-weight:700">${sub}</div>`}
          <div style="font-size:23px;font-weight:700;letter-spacing:-0.5px;color:${D.text}">${titulo}</div>
        </div>
      </div>`;
    }

    // ── Dashboard ────────────────────────────────────────────────
    function Dashboard({data, setView}) {

            <div style="font-size:26px;font-weight:800;color:${D.text};letter-spacing:-0.5px">${data.profile.peso}<span style="font-size:14px;color:${D.dim}">kg</span></div>
            <div style="font-size:12px;color:${D.dim};margin-bottom:8px">Peso actual</div>

    // ── Entreno ──────────────────────────────────────────────────
    function Entreno({data, save, setView}) {
      const hoy=nombreDia(), hk=hoyKey();
      const defIdx=()=>{const i=RUTINA.findIndex(r=>r.dia.toLowerCase()===hoy.toLowerCase());return i>=0?i:0;};
      const sess=loadSession(hk);
      const [diaIdx,setDiaIdx]=useState(sess?.diaIdx??defIdx());
      const [sets,setSets]=useState(sess?.sets||{});
      const [pesos,setPesos]=useState(sess?.pesos||{});
      const [timer,setTimer]=useState(null);
      const [toast,setToast]=useState(null);
      const rut=RUTINA[diaIdx],ac=rut.acento;
      const totalSets=rut.ejercicios.reduce((a,e)=>a+e.series,0);
      const hechos=Object.values(sets).flat().filter(Boolean).length;
      const pct=Math.round((hechos/totalSets)*100);

      useEffect(()=>{ saveSession({fecha:hk,diaIdx,sets,pesos}); },[diaIdx,sets,pesos]);

      function cambiarDia(i){setDiaIdx(i);setSets({});setPesos({});setTimer(null);}
      function toggle(ei,si){
        const arr=sets[ei]||Array(rut.ejercicios[ei].series).fill(false);
        const nv=[...arr];nv[si]=!nv[si];
        setSets({...sets,[ei]:nv});
        if(nv[si])setTimer({seg:rut.ejercicios[ei].descanso,key:`${ei}-${si}-${Date.now()}`});
      }
      function setPeso(nombre,val){
        setPesos({...pesos,[nombre]:val});
        const rec=data.records[nombre];
        if(val&&rec&&+val>rec.peso){setToast(`Récord en ${nombre}`);setTimeout(()=>setToast(null),2800);}
      }
      function completar(){
        const recs={...data.records};
        rut.ejercicios.forEach(ej=>{const p=+pesos[ej.nombre];if(p&&(!recs[ej.nombre]||p>=recs[ej.nombre].peso))recs[ej.nombre]={peso:p,fecha:hk};});
        const nr=data.racha+1;
        clearSession();
        save({...data,racha:nr,mejorRacha:Math.max(data.mejorRacha,nr),
          registros:{...data.registros,[hk]:{rutina:rut.nombre,sets:hechos}},records:recs});
        setView("home");
      }

      return html`<div style="padding:2rem 1.2rem 1rem;position:relative">
        ${toast&&html`<div class="fade" style="position:sticky;top:10px;z-index:20;background:${D.lime};color:${D.bg};padding:12px 16px;border-radius:14px;font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;box-shadow:0 0 30px ${D.lime}66">
          <i class="ti ti-trophy" style="font-size:18px"/> ${toast} 🎉
        </div>`}
        <${TopBar} titulo=${rut.nombre} sub="${rut.dia} · Semana ${data.semana}" onBack=${()=>setView("home")} acento=${ac}/>

        <div style="display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px">
          ${RUTINA.map((r,i)=>html`<button class="press" onClick=${()=>cambiarDia(i)}
            style="flex-shrink:0;padding:9px 15px;font-size:12px;background:${i===diaIdx?r.acento:D.card};color:${i===diaIdx?D.bg:D.dim};border:1px solid ${i===diaIdx?r.acento:D.line};border-radius:12px;cursor:pointer;font-weight:700">
            ${r.corto}
          </button>`)}
        </div>

        <div style="background:linear-gradient(145deg,${D.card},${D.surface});border:1px solid ${ac}33;border-radius:20px;padding:18px;margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">
            <span style="font-size:11px;color:${D.faint};text-transform:uppercase;letter-spacing:1.5px;font-weight:700">Progreso</span>
            <span style="font-size:22px;font-weight:800;color:${ac}">${pct}%</span>
          </div>
          <${Bar} pct=${pct} color=${ac} h=${8}/>
          <div style="font-size:12px;color:${D.dim};margin-top:8px">${hechos} de ${totalSets} series</div>
        </div>

        ${timer&&html`<div style="margin-bottom:16px"><${Timer} key=${timer.key} segundos=${timer.seg} onDone=${()=>setTimer(null)} color=${ac}/></div>`}

        ${rut.ejercicios.map((ej,ei)=>{
          const s=sets[ei]||Array(ej.series).fill(false);
          const completo=s.every(Boolean),rec=data.records[ej.nombre];
          return html`<div style="background:${D.card};border:1px solid ${completo?ac+"55":D.line};border-radius:20px;padding:18px;margin-bottom:12px;transition:border-color 0.3s">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
              <div>
                <div style="font-size:16px;font-weight:700;color:${D.text}">${ej.nombre}</div>
                <div style="font-size:12px;color:${D.dim};margin-top:2px"><span style="color:${ac};font-weight:700">${ej.series}×${ej.reps}</span> · ${ej.descanso}s</div>
              </div>
              ${completo&&html`<div style="width:28px;height:28px;border-radius:9px;background:${ac};display:flex;align-items:center;justify-content:center"><i class="ti ti-check" style="color:${D.bg};font-size:17px"/></div>`}
            </div>
            <div style="font-size:12px;color:${D.dim};margin:10px 0;background:${D.surface};padding:9px 12px;border-radius:11px;border:1px solid ${D.line}">
              <i class="ti ti-bulb" style="color:${D.amber};font-size:14px;margin-right:6px;vertical-align:-2px"/>${ej.notas}
            </div>
            <div style="display:flex;gap:9px;align-items:center;margin-bottom:12px">
              <input type="number" placeholder="Peso usado (kg)" value=${pesos[ej.nombre]||""} onInput=${e=>setPeso(ej.nombre,e.target.value)} style="flex:1"/>
              ${rec&&html`<div style="font-size:11px;font-weight:700;color:${D.amber};background:${D.surface};border:1px solid ${D.amber}33;padding:9px 12px;border-radius:11px;white-space:nowrap;display:flex;align-items:center;gap:5px">
                <i class="ti ti-trophy" style="font-size:13px"/>${rec.peso}kg
              </div>`}
            </div>
            <div style="display:flex;gap:8px">
              ${Array.from({length:ej.series}).map((_,si)=>html`<button class="press" onClick=${()=>toggle(ei,si)}
                style="flex:1;height:48px;border-radius:13px;background:${s[si]?ac:D.surface};color:${s[si]?D.bg:D.faint};border:1px solid ${s[si]?ac:D.line};cursor:pointer;font-weight:800;font-size:15px;transition:all 0.15s">
                ${s[si]?html`<i class="ti ti-check"/>`:si+1}
              </button>`)}
            </div>
          </div>`;
        })}

        <button class="press" disabled=${pct<100} onClick=${completar}
          style="width:100%;padding:16px;background:${pct===100?`linear-gradient(135deg,${D.lime},${D.limeDark})`:D.card};color:${pct===100?D.bg:D.faint};border:1px solid ${pct===100?D.lime:D.line};border-radius:16px;font-size:15px;font-weight:800;cursor:${pct===100?'pointer':'default'};margin-top:6px;box-shadow:${pct===100?`0 8px 30px ${D.lime}44`:'none'}">
          ${pct===100?"Completar entrenamiento ✓":`Completa las series · ${hechos}/${totalSets}`}
        </button>
      </div>`;
    }

    // ── Comidas ──────────────────────────────────────────────────
    function Comidas({data, save, setView}) {
      const hk=hoyKey();
      const cm=data.comidas[hk]||{cal:0,prot:0,carbs:0,grasa:0,items:[]};
      const aguaHoy=data.agua[hk]||0;
      const [tab,setTab]=useState("rapido");
      const [busca,setBusca]=useState("");
      const [m,setM]=useState({n:"",cal:"",p:"",c:"",g:""});
      const fileRef=useRef();

      function añadir(it){save({...data,comidas:{...data.comidas,[hk]:{cal:cm.cal+(it.cal||0),prot:cm.prot+(it.p||0),carbs:cm.carbs+(it.c||0),grasa:cm.grasa+(it.gr||0),items:[...(cm.items||[]),{n:it.n,cal:it.cal}]}}});}
      function añadirManual(){if(!m.cal)return;añadir({n:m.n||"Comida",cal:+m.cal||0,p:+m.p||0,c:+m.c||0,gr:+m.g||0});setM({n:"",cal:"",p:"",c:"",g:""});}
      function agua(d){save({...data,agua:{...data.agua,[hk]:Math.max(0,Math.round((aguaHoy+d)*10)/10)}});}
      function quitar(idx){const items=[...(cm.items||[])];const it=items[idx];items.splice(idx,1);save({...data,comidas:{...data.comidas,[hk]:{...cm,items,cal:Math.max(0,cm.cal-it.cal)}}});}

      function exportarCSV(){
        const rows=[["ENTRENOS","","",""],["Fecha","Rutina","Series",""]];
        Object.entries(data.registros).sort().forEach(([k,r])=>rows.push([k,r.rutina,r.sets,""]));
        rows.push(["","","",""]);
        rows.push(["RÉCORDS","","",""]);rows.push(["Ejercicio","Peso (kg)","Fecha",""]);
        Object.entries(data.records).sort().forEach(([n,r])=>rows.push([n,r.peso,r.fecha,""]));
        rows.push(["","","",""]);
        rows.push(["PESO CORPORAL","","",""]);rows.push(["Fecha","Peso (kg)","",""]);
        Object.entries(data.pesoCorporal).sort().forEach(([k,v])=>rows.push([k,v,"",""]));
        rows.push(["","","",""]);
        rows.push(["NUTRICIÓN","","",""]);rows.push(["Fecha","Calorías","Proteína (g)","Carbos (g)","Grasa (g)"]);
        Object.entries(data.comidas).sort().forEach(([k,c])=>rows.push([k,Math.round(c.cal||0),Math.round(c.prot||0),Math.round(c.carbs||0),Math.round(c.grasa||0)]));
        const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
        const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
        const url=URL.createObjectURL(blob),a=document.createElement("a");
        a.href=url;a.download=`ouryfit-${hk}.csv`;a.click();URL.revokeObjectURL(url);
      }

      const filt=ALIMENTOS.filter(a=>a.n.toLowerCase().includes(busca.toLowerCase()));
      const macros=[
        {l:"Kcal",v:cm.cal,m:data.metas.calorias,c:D.lime},
        {l:"Prot",v:cm.prot,m:data.metas.proteina,c:D.cyan},
        {l:"Carb",v:cm.carbs,m:data.metas.carbs,c:D.amber},
        {l:"Grasa",v:cm.grasa,m:data.metas.grasa,c:D.violet},
      ];

      return html`<div style="padding:2rem 1.2rem 1rem">
        <${TopBar} titulo="Nutrición" sub="Lo que comes hoy" onBack=${()=>setView("home")}/>

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:9px;margin-bottom:14px">
          ${macros.map(x=>html`<div style="background:${D.card};border:1px solid ${D.line};border-radius:16px;padding:13px 9px;text-align:center">
            <div style="font-size:10px;color:${D.faint};text-transform:uppercase;letter-spacing:1px;font-weight:700">${x.l}</div>
            <div style="font-size:17px;font-weight:800;color:${D.text};margin:4px 0 6px">${Math.round(x.v)}</div>
            <${Bar} pct=${(x.v/x.m)*100} color=${x.c} h=${4}/>
            <div style="font-size:10px;color:${D.faint};margin-top:5px">/${x.m}</div>
          </div>`)}
        </div>

        <div style="background:${D.card};border:1px solid ${D.cyan}33;border-radius:20px;padding:18px;margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="display:flex;align-items:center;gap:12px">
              <div style="width:44px;height:44px;border-radius:13px;background:${D.surface};border:1px solid ${D.cyan}33;display:flex;align-items:center;justify-content:center">
                <i class="ti ti-droplet" style="font-size:22px;color:${D.cyan}"/>
              </div>
              <div>
                <div style="font-size:20px;font-weight:800;color:${D.text}">${aguaHoy.toFixed(1)}<span style="font-size:13px;color:${D.dim}"> / ${data.metas.agua}L</span></div>
                <div style="font-size:12px;color:${D.dim}">Hidratación</div>
              </div>
            </div>
            <div style="display:flex;gap:8px">
              <button class="press" onClick=${()=>agua(-0.25)} style="width:42px;height:42px;padding:0;background:${D.surface};color:${D.text};border:1px solid ${D.line};border-radius:12px;cursor:pointer"><i class="ti ti-minus" style="font-size:18px"/></button>
              <button class="press" onClick=${()=>agua(0.25)} style="width:42px;height:42px;padding:0;background:${D.cyan};color:${D.bg};border:none;border-radius:12px;cursor:pointer"><i class="ti ti-plus" style="font-size:18px"/></button>
            </div>
          </div>
          <div style="margin-top:14px"><${Bar} pct=${(aguaHoy/data.metas.agua)*100} color=${D.cyan} h=${6}/></div>
        </div>

        <div style="display:flex;gap:6px;margin-bottom:16px;background:${D.card};padding:5px;border-radius:14px;border:1px solid ${D.line}">
          ${[{id:"rapido",l:"Alimentos"},{id:"manual",l:"Manual"}].map(t=>html`
            <button onClick=${()=>setTab(t.id)}
              style="flex:1;padding:11px;font-size:13px;background:${tab===t.id?D.lime:"transparent"};color:${tab===t.id?D.bg:D.dim};border:none;border-radius:10px;cursor:pointer;font-weight:700;transition:all 0.2s">
              ${t.l}
            </button>
          `)}
        </div>

        ${tab==="rapido"&&html`<div>
          <div style="position:relative;margin-bottom:12px">
            <i class="ti ti-search" style="position:absolute;left:14px;top:14px;font-size:17px;color:${D.faint}"/>
            <input placeholder="Buscar alimento..." value=${busca} onInput=${e=>setBusca(e.target.value)} style="width:100%;padding-left:40px"/>
          </div>
          ${filt.map(a=>html`<div class="press" onClick=${()=>añadir(a)}
            style="display:flex;justify-content:space-between;align-items:center;padding:13px 15px;background:${D.card};border:1px solid ${D.line};border-radius:15px;margin-bottom:9px;cursor:pointer">
            <div>
              <div style="font-size:14px;font-weight:700;color:${D.text}">${a.n} <span style="color:${D.faint};font-weight:400;font-size:12px">· ${a.g}</span></div>
              <div style="font-size:12px;color:${D.dim};margin-top:2px"><span style="color:${D.lime};font-weight:600">${a.cal} kcal</span> · P${a.p} C${a.c} G${a.gr}</div>
            </div>
            <div style="width:34px;height:34px;border-radius:11px;background:${D.lime};display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <i class="ti ti-plus" style="color:${D.bg};font-size:19px"/>
            </div>
          </div>`)}
          ${filt.length===0&&html`<div style="font-size:13px;color:${D.faint};text-align:center;padding:20px">Sin resultados — usa Manual.</div>`}
        </div>`}

        ${tab==="manual"&&html`<div style="background:${D.card};border:1px solid ${D.line};border-radius:18px;padding:18px">
          <input placeholder="Nombre (opcional)" value=${m.n} onInput=${e=>setM({...m,n:e.target.value})} style="width:100%;margin-bottom:11px"/>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
            ${[{k:"cal",l:"Calorías"},{k:"p",l:"Proteína (g)"},{k:"c",l:"Carbos (g)"},{k:"g",l:"Grasa (g)"}].map(f=>html`<div>
              <label style="font-size:11px;color:${D.faint};display:block;margin-bottom:5px;font-weight:600">${f.l}</label>
              <input type="number" value=${m[f.k]} onInput=${e=>setM({...m,[f.k]:e.target.value})} style="width:100%"/>
            </div>`)}
          </div>
          <button class="press" onClick=${añadirManual} style="width:100%;padding:13px;background:linear-gradient(135deg,${D.lime},${D.limeDark});color:${D.bg};border:none;border-radius:13px;font-size:14px;cursor:pointer;font-weight:800">
            Añadir comida
          </button>
        </div>`}

        ${(cm.items||[]).length>0&&html`<div style="margin-top:20px">
          <div style="font-size:11px;color:${D.faint};text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:11px">Comido hoy</div>
          ${cm.items.map((it,i)=>html`<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 15px;background:${D.card};border:1px solid ${D.line};border-radius:15px;margin-bottom:8px">
            <div>
              <div style="font-size:14px;font-weight:600;color:${D.text}">${it.n}</div>
              <div style="font-size:12px;color:${D.dim}">${Math.round(it.cal)} kcal</div>
            </div>
            <button class="press" onClick=${()=>quitar(i)} style="width:38px;height:38px;padding:0;display:flex;align-items:center;justify-content:center;background:${D.surface};color:${D.rose};border:1px solid ${D.rose}33;border-radius:12px;cursor:pointer;flex-shrink:0">
              <i class="ti ti-x" style="font-size:19px"/>
            </button>
          </div>`)}
        </div>`}

        <div style="margin-top:20px">
          <button class="press" onClick=${exportarCSV} style="width:100%;padding:12px;background:${D.surface};color:${D.text};border:1px solid ${D.line};border-radius:12px;cursor:pointer;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;gap:7px">
            <i class="ti ti-download" style="font-size:16px"/> Exportar CSV para Google Sheets
          </button>
        </div>
      </div>`;
    }

    // ── Progreso ─────────────────────────────────────────────────
    function Progreso({data, save, setView}) {
      const [pw,setPw]=useState("");
      const [ejSel,setEjSel]=useState(null);
      const [msg,setMsg]=useState(null);
      const hk=hoyKey();

      function guardarPeso(){if(!pw)return;save({...data,pesoCorporal:{...data.pesoCorporal,[hk]:+pw},profile:{...data.profile,peso:+pw}});setPw("");}

      const pesos=Object.entries(data.pesoCorporal).sort((a,b)=>a[0].localeCompare(b[0]));
      const entrenos=Object.entries(data.registros).sort((a,b)=>b[0].localeCompare(a[0]));
      const records=Object.entries(data.records).sort((a,b)=>b[1].peso-a[1].peso);
      const minP=pesos.length?Math.min(...pesos.map(p=>p[1]))-1:0;
      const maxP=pesos.length?Math.max(...pesos.map(p=>p[1]),data.metas.pesoObjetivo)+1:100;
      const rango=maxP-minP||1;
      const pi=data.profile.peso||70;
      const metas=[
        {sem:4,t:`${(pi+1).toFixed(0)}kg`,d:"Primer kilo",done:data.semana>4},
        {sem:8,t:`${(pi+2).toFixed(0)}kg`,d:"Progresión sólida",done:data.semana>8},
        {sem:12,t:`${data.metas.pesoObjetivo}kg`,d:"Meta 3 meses",done:data.semana>12},
        {sem:16,t:"+10%",d:"Más fuerte en todo",done:data.semana>16},
      ];
      const ultimos28=[];
      for(let i=27;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const k=d.toISOString().split("T")[0];ultimos28.push({k,hecho:!!data.registros[k]});}
      const diasActivos=ultimos28.filter(d=>d.hecho).length;
      const histEj=(data.historialEjercicio&&data.historialEjercicio[ejSel])||[];

      return html`<div style="padding:2rem 1.2rem 1rem">
        <${TopBar} titulo="Mi progreso" sub="Tus números" onBack=${()=>setView("home")}/>

        ${msg&&html`<div style="background:${D.lime};color:${D.bg};padding:11px 15px;border-radius:13px;font-size:13px;font-weight:700;margin-bottom:14px;text-align:center">${msg}</div>`}

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
          ${[{l:"Racha",v:data.racha,c:D.amber,icon:"ti-flame"},{l:"Récord",v:data.mejorRacha,c:D.rose,icon:"ti-star"},{l:"Entrenos",v:entrenos.length,c:D.lime,icon:"ti-barbell"}].map(x=>html`
            <div style="background:${D.card};border:1px solid ${D.line};border-radius:18px;padding:16px 8px;text-align:center">
              <i class="ti ${x.icon}" style="font-size:20px;color:${x.c}"/>
              <div style="font-size:26px;font-weight:800;color:${D.text};letter-spacing:-1px;margin:3px 0">${x.v}</div>
              <div style="font-size:10px;color:${D.faint};text-transform:uppercase;letter-spacing:0.5px;font-weight:600">${x.l}</div>
            </div>
          `)}
        </div>

        <div style="background:${D.card};border:1px solid ${D.line};border-radius:20px;padding:18px;margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px">
            <div style="font-size:11px;color:${D.faint};text-transform:uppercase;letter-spacing:1.5px;font-weight:700">Constancia · 28 días</div>
            <div style="font-size:13px;color:${D.lime};font-weight:700">${diasActivos} días</div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(14,1fr);gap:5px">
            ${ultimos28.map(d=>html`<div style="aspect-ratio:1;border-radius:5px;background:${d.hecho?D.lime:D.surface};border:1px solid ${d.hecho?D.lime:D.line};box-shadow:${d.hecho?`0 0 8px ${D.lime}55`:'none'}"/>`)}
          </div>
          <div style="font-size:11px;color:${D.faint};margin-top:10px">Verde = día entrenado</div>
        </div>

        <div style="background:${D.card};border:1px solid ${D.line};border-radius:20px;padding:18px;margin-bottom:14px">
          <div style="font-size:11px;color:${D.faint};text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:14px">Evolución de peso</div>
          ${pesos.length>=2?html`<svg viewBox="0 0 300 120" style="width:100%;height:auto">
            <defs><linearGradient id="pg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="${D.lime}" stop-opacity="0.4"/>
              <stop offset="100%" stop-color="${D.lime}" stop-opacity="0"/>
            </linearGradient></defs>
            ${(()=>{const objY=108-((data.metas.pesoObjetivo-minP)/rango)*96;return html`<g>
              <line x1="0" y1=${objY} x2="300" y2=${objY} stroke=${D.cyan} stroke-width="1.5" stroke-dasharray="4 4" opacity="0.7"/>
              <text x="297" y=${objY-5} font-size="9" fill=${D.cyan} text-anchor="end" font-weight="600">META</text>
            </g>`})()}
            ${(()=>{
              const pts=pesos.map((p,i)=>[(i/(pesos.length-1))*290+5,108-((p[1]-minP)/rango)*96]);
              const linea=pts.map(p=>`${p[0]},${p[1]}`).join(" ");
              return html`<g>
                <polygon points="5,108 ${linea} ${pts[pts.length-1][0]},108" fill="url(#pg)"/>
                <polyline fill="none" stroke=${D.lime} stroke-width="3" stroke-linejoin="round" stroke-linecap="round" points=${linea} style="filter:drop-shadow(0 0 4px ${D.lime})"/>
                ${pts.map((p,i)=>html`<circle cx=${p[0]} cy=${p[1]} r="4" fill=${D.bg} stroke=${D.lime} stroke-width="2.5"/>`)}
              </g>`;
            })()}
          </svg>`:html`<div style="font-size:13px;color:${D.faint};text-align:center;padding:16px">Registra tu peso 2+ veces para ver la gráfica.</div>`}
          <div style="display:flex;gap:9px;margin-top:14px">
            <input type="number" placeholder="Peso actual: ${data.profile.peso}kg" value=${pw} onInput=${e=>setPw(e.target.value)} style="flex:1"/>
            <button class="press" onClick=${guardarPeso} style="padding:0 20px;background:${D.lime};color:${D.bg};border:none;border-radius:12px;cursor:pointer;font-weight:800;font-size:14px">Guardar</button>
          </div>
        </div>

        ${records.length>0&&html`<div style="background:${D.card};border:1px solid ${D.line};border-radius:20px;padding:18px;margin-bottom:14px">
          <div style="font-size:11px;color:${D.faint};text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:14px">Récords personales</div>
          ${records.slice(0,6).map(([n,r],i)=>html`<div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:9px 0;border-bottom:${i!==Math.min(records.length,6)-1?`1px solid ${D.line}`:'none'}">
            <span style="color:${D.text}">${n}</span>
            <span style="font-weight:800;color:${D.amber};background:${D.surface};border:1px solid ${D.amber}33;padding:4px 11px;border-radius:9px;font-size:12px">${r.peso}kg</span>
          </div>`)}
        </div>`}

        <div style="background:${D.card};border:1px solid ${D.line};border-radius:20px;padding:18px;margin-bottom:14px">
          <div style="font-size:11px;color:${D.faint};text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:12px">Metas del programa</div>
          ${metas.map((mt,idx)=>{const activa=!mt.done&&data.semana<=mt.sem&&data.semana>(metas[idx-1]?.sem||0);return html`
            <div style="display:flex;align-items:center;gap:13px;padding:11px 0;border-bottom:${idx!==3?`1px solid ${D.line}`:'none'}">
              <div style="width:32px;height:32px;border-radius:10px;background:${mt.done?D.lime:activa?D.surface:"transparent"};border:1px solid ${mt.done?D.lime:activa?D.lime+"55":D.line};display:flex;align-items:center;justify-content:center;flex-shrink:0">
                ${mt.done?html`<i class="ti ti-check" style="color:${D.bg};font-size:17px"/>`:html`<span style="font-size:12px;color:${activa?D.lime:D.faint};font-weight:800">${mt.sem}</span>`}
              </div>
              <div style="flex:1">
                <div style="font-size:14px;font-weight:700;color:${D.text}">${mt.t} <span style="color:${D.dim};font-weight:400">· ${mt.d}</span></div>
                <div style="font-size:11px;color:${D.faint}">Semana ${mt.sem}</div>
              </div>
              ${activa&&html`<span style="font-size:9px;color:${D.bg};font-weight:800;background:${D.lime};padding:4px 9px;border-radius:7px;letter-spacing:0.5px">EN CURSO</span>`}
            </div>
          `;})}
        </div>

        <div style="background:${D.card};border:1px solid ${D.line};border-radius:20px;padding:18px;margin-bottom:14px">
          <div style="font-size:11px;color:${D.faint};text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:11px">Historial</div>
          ${entrenos.length===0?html`<div style="font-size:13px;color:${D.faint}">Aún sin sesiones.</div>`:""}
          ${entrenos.slice(0,12).map(([k,r],i)=>html`<div style="display:flex;justify-content:space-between;font-size:13px;padding:9px 0;border-bottom:${i!==Math.min(entrenos.length,12)-1?`1px solid ${D.line}`:'none'}">
            <span style="color:${D.faint}">${k}</span>
            <span style="color:${D.text};font-weight:600">${r.rutina}</span>
          </div>`)}
        </div>

        <div style="background:linear-gradient(145deg,${D.card},${D.surface});border:1px solid ${D.violet}33;border-radius:20px;padding:18px;box-shadow:0 0 30px ${D.violet}1a">
          <div style="font-size:19px;font-weight:800;color:${D.text}">Semana ${data.semana}</div>
          <div style="font-size:13px;color:${D.dim};margin:4px 0 13px">Avanza cuando completes tus 4 entrenos.</div>
          <button class="press" onClick=${()=>save({...data,semana:data.semana+1})} style="padding:11px 20px;font-size:13px;background:${D.violet};color:#fff;border:none;border-radius:12px;cursor:pointer;font-weight:700">
            Avanzar a semana ${data.semana+1}
          </button>
        </div>
      </div>`;
    }

    // ── App ──────────────────────────────────────────────────────
    function App() {
      const {data,save,loaded,email,handleGoogleLogin,logout,authError,syncing} = useStore();
      const [view,setView] = useState("home");

      if (!email) return html`<${LoginScreen} onLogin=${handleGoogleLogin} error=${authError}/>`;
      if (!loaded) return html`<div style="background:${D.bg};height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px">
        <${Spinner}/>
        <div style="color:${D.faint};font-size:13px">Cargando tus datos...</div>
      </div>`;
      if (!data.profile.setup) return html`<${Setup} data=${data} save=${save}/>`;

      const tabs=[{id:"home",l:"Inicio",icon:"ti-home"},{id:"entreno",l:"Gym",icon:"ti-barbell"},{id:"comidas",l:"Comer",icon:"ti-salad"},{id:"progreso",l:"Progreso",icon:"ti-chart-line"}];

      return html`<div style="background:${D.bg};color:${D.text};min-height:100vh">
        ${syncing&&html`<div style="position:fixed;top:10px;right:10px;z-index:100;background:${D.card};border:1px solid ${D.line};border-radius:10px;padding:6px 12px;font-size:11px;color:${D.dim};display:flex;align-items:center;gap:6px">
          <${Spinner} size=${14} color=${D.lime}/> Guardando...
        </div>`}
        <div style="max-width:460px;margin:0 auto;padding-bottom:90px">
          ${view==="home"&&html`<${Dashboard} data=${data} setView=${setView}/>`}
          ${view==="entreno"&&html`<${Entreno} data=${data} save=${save} setView=${setView}/>`}
          ${view==="comidas"&&html`<${Comidas} data=${data} save=${save} setView=${setView}/>`}
          ${view==="progreso"&&html`<${Progreso} data=${data} save=${save} setView=${setView}/>`}
        </div>
        <div style="position:fixed;bottom:14px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:428px;display:flex;gap:4px;background:rgba(26,26,38,0.92);border:1px solid ${D.line};border-radius:20px;padding:6px;box-shadow:0 12px 40px rgba(0,0,0,0.6);backdrop-filter:blur(16px)">
          ${tabs.map(t=>{const a=view===t.id;return html`<button class="press" onClick=${()=>setView(t.id)}
            style="flex:1;padding:10px 4px;background:${a?D.lime:"transparent"};border:none;border-radius:14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:background 0.25s">
            <i class="ti ${t.icon}" style="font-size:21px;color:${a?D.bg:D.faint}"/>
            <span style="font-size:9px;font-weight:700;color:${a?D.bg:D.faint};letter-spacing:0.3px">${t.l}</span>
          </button>`;})}
          <button class="press" onClick=${logout} title="Cerrar sesión"
            style="width:48px;padding:10px 4px;background:transparent;border:none;border-radius:14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px">
            <i class="ti ti-logout" style="font-size:19px;color:${D.faint}"/>
            <span style="font-size:9px;font-weight:700;color:${D.faint}">Salir</span>
          </button>
        </div>
      </div>`;
    }

    render(html`<${App}/>`, document.getElementById("root"));
  </script>
</body>
</html>
